name: build-riscv-toolchain

# Build the RISC-V GCC toolchain and publish the tarball to Nexus.
#
# The upload destination is chosen by build.sh (see phase_upload):
#   - push to main  -> UPLOAD=1 (no -u): staging path ".../upload/v<VER>/"
#   - push tag v*    -> build.sh -u:      original path ".../v<VER>/"
on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: [self-hosted, build-gcc-riscv]
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 texinfo bison flex \
            wget curl zlib1g-dev libexpat1-dev pigz file

      # Default branch builds upload to the staging path ("/upload/" prefix);
      # UPLOAD=1 enables the upload, build.sh picks the staging URL.
      - name: Build and upload (staging)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          UPLOAD: "1"
        run: ./build.sh

      # Tag builds pass -u so build.sh uploads to its original (release) URL.
      - name: Build and upload (release)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: ./build.sh -u
